<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brendenbets</title>

<style>

body{
margin:0;
background:#1b5e20;
font-family:Arial;
color:white;
overflow:hidden;
touch-action:none;
}

/* header */

header{
background:#111;
padding:10px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* hud */

#hud{
display:flex;
justify-content:space-around;
padding:6px;
font-size:18px;
}

/* race area */

#race{
position:relative;
width:100vw;
height:70vh;
background:linear-gradient(#2e7d32,#1b5e20);
overflow:hidden;
border-top:4px solid #4e342e;
border-bottom:4px solid #4e342e;
}

/* horse */

.horse{
position:absolute;
width:110px;
height:70px;
background-image:url("https://i.imgur.com/Fd6V6gM.png");
background-size:contain;
background-repeat:no-repeat;
}

/* crosshair */

#crosshair{
position:absolute;
width:60px;
height:60px;
pointer-events:none;
}

.cross{
position:absolute;
background:red;
}

.h{width:60px;height:3px;top:28px;}
.v{height:60px;width:3px;left:28px;}

.center{
width:10px;
height:10px;
border-radius:50%;
background:red;
top:25px;
left:25px;
}

/* flash */

.flash{
position:absolute;
width:50px;
height:50px;
background:rgba(255,255,0,.7);
border-radius:50%;
animation:flash .3s forwards;
pointer-events:none;
}

@keyframes flash{
from{transform:scale(.2);opacity:1}
to{transform:scale(2);opacity:0}
}

/* button */

button{
margin:10px auto;
display:block;
padding:10px 25px;
font-size:16px;
background:#ffd54f;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<header>🏇 Brendenbets</header>

<div id="hud">
<div>Score: <span id="score">0</span></div>
<div>Combo: <span id="combo">0</span></div>
<div>Time: <span id="time">30</span></div>
</div>

<div id="race"></div>

<button onclick="startGame()">Start Race</button>

<div id="crosshair">
<div class="cross h"></div>
<div class="cross v"></div>
<div class="cross center"></div>
</div>

<script>

let horses=[]
let score=0
let combo=0
let time=30
let running=false

const race=document.getElementById("race")
const cross=document.getElementById("crosshair")

/* crosshair movement */

document.addEventListener("touchmove",e=>{

const x=e.touches[0].pageX
const y=e.touches[0].pageY

cross.style.left=x-30+"px"
cross.style.top=y-30+"px"

})

/* shooting */

document.addEventListener("touchstart",e=>{

const x=e.touches[0].pageX
const y=e.touches[0].pageY

createFlash(x,y)

let hit=false

horses.forEach((horse,i)=>{

const rect=horse.getBoundingClientRect()

if(x>rect.left && x<rect.right && y>rect.top && y<rect.bottom){

horse.remove()
horses.splice(i,1)

score+=1+combo
combo++

updateHUD()

hit=true

}

})

if(!hit) combo=0

})

/* flash effect */

function createFlash(x,y){

const flash=document.createElement("div")
flash.className="flash"

flash.style.left=x-25+"px"
flash.style.top=y-25+"px"

document.body.appendChild(flash)

setTimeout(()=>flash.remove(),300)

}

/* create horse */

function createHorse(){

const horse=document.createElement("div")
horse.className="horse"

horse.x=-120
horse.y=Math.random()* (race.offsetHeight-80)

horse.speed=2+Math.random()*4

race.appendChild(horse)

horses.push(horse)

}

/* movement */

function moveHorses(){

if(!running) return

horses.forEach(horse=>{

horse.x+=horse.speed

horse.style.left=horse.x+"px"
horse.style.top=horse.y+"px"

if(horse.x>window.innerWidth){

horse.x=-120
horse.y=Math.random()*(race.offsetHeight-80)

}

})

requestAnimationFrame(moveHorses)

}

/* spawn horses */

function spawnLoop(){

if(!running) return

createHorse()

setTimeout(spawnLoop,1000)

}

/* hud */

function updateHUD(){

document.getElementById("score").textContent=score
document.getElementById("combo").textContent=combo

}

/* start */

function startGame(){

score=0
combo=0
time=30
running=true

horses=[]
race.innerHTML=""

updateHUD()

document.getElementById("time").textContent=time

spawnLoop()
moveHorses()

const timer=setInterval(()=>{

time--
document.getElementById("time").textContent=time

if(time<=0){

running=false
clearInterval(timer)

alert("Race finished! Score: "+score)

}

},1000)

}

</script>

</body>
</html>
