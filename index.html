<!DOCTYPE html>
<html>
<head>
<title>Brendenbets Racing Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d0b;
color:white;
text-align:center;
overflow:hidden;
cursor:none;
}

/* header */

header{
background:#111;
padding:15px;
font-size:36px;
font-weight:bold;
letter-spacing:2px;
box-shadow:0 4px 10px rgba(0,0,0,0.6);
}

/* hud */

#hud{
display:flex;
justify-content:center;
gap:60px;
font-size:22px;
margin:10px;
}

/* racecourse */

#racecourse{
width:1100px;
height:550px;
margin:auto;
position:relative;
background:linear-gradient(#2e7d32,#1b5e20);
border:8px solid #5d4037;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* crowd */

.crowd{
position:absolute;
top:0;
width:100%;
height:70px;
background:repeating-linear-gradient(
90deg,
#444,
#444 8px,
#777 8px,
#777 16px
);
}

/* racetrack */

.track{
position:absolute;
width:880px;
height:380px;
border:18px solid #d7ccc8;
border-radius:50%;
top:90px;
left:110px;
}

/* horses */

.horse{
position:absolute;
width:120px;
height:90px;
transition:transform .1s;
}

/* body */

.horse-body{
width:80px;
height:40px;
background:linear-gradient(#8d6e63,#4e342e);
border-radius:20px;
position:absolute;
bottom:0;
left:25px;
box-shadow:0 3px 4px rgba(0,0,0,.5);
}

.horse-head{
width:25px;
height:25px;
background:#6d4c41;
border-radius:50%;
position:absolute;
top:10px;
left:0;
}

/* legs */

.leg{
width:6px;
height:22px;
background:#3e2723;
position:absolute;
bottom:-18px;
animation:run .3s infinite alternate;
}

.l1{left:30px}
.l2{left:50px;animation-delay:.1s}
.l3{left:65px}
.l4{left:85px;animation-delay:.1s}

@keyframes run{
from{transform:rotate(15deg)}
to{transform:rotate(-15deg)}
}

/* jockey */

.jockey{
position:absolute;
top:-35px;
left:45px;
}

.jockey-head{
width:20px;
height:20px;
background:#f1c27d;
border-radius:50%;
}

.jockey-body{
width:30px;
height:25px;
background:#1db954;
position:relative;
}

.jockey-body::after{
content:"";
width:12px;
height:12px;
background:yellow;
position:absolute;
top:6px;
left:9px;
transform:rotate(45deg);
}

/* crosshair */

#crosshair{
position:absolute;
width:40px;
height:40px;
pointer-events:none;
z-index:1000;
}

.cross{
position:absolute;
background:red;
}

.cross.h{
width:40px;
height:2px;
top:19px;
}

.cross.v{
height:40px;
width:2px;
left:19px;
}

.cross.center{
width:6px;
height:6px;
border-radius:50%;
background:red;
top:17px;
left:17px;
}

/* hit flash */

.hit{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
background:rgba(255,255,0,.6);
animation:hit .4s forwards;
pointer-events:none;
}

@keyframes hit{
from{transform:scale(.3);opacity:1}
to{transform:scale(2);opacity:0}
}

button{
margin-top:15px;
padding:12px 30px;
font-size:18px;
background:#ffd54f;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffca28;
}

</style>
</head>

<body>

<header>🏇 Brendenbets</header>

<div id="hud">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">30</span></div>
</div>

<div id="racecourse">
<div class="crowd"></div>
<div class="track"></div>
</div>

<button onclick="startGame()">Start Race</button>

<div id="crosshair">
<div class="cross h"></div>
<div class="cross v"></div>
<div class="cross center"></div>
</div>

<script>

let horses=[]
let angle=0
let score=0
let time=30
let running=false

const racecourse=document.getElementById("racecourse")

/* crosshair follow */

const cross=document.getElementById("crosshair")

document.addEventListener("mousemove",e=>{
cross.style.left=e.pageX-20+"px"
cross.style.top=e.pageY-20+"px"
})

/* hit effect */

document.addEventListener("click",e=>{

const hit=document.createElement("div")
hit.className="hit"

hit.style.left=e.pageX-20+"px"
hit.style.top=e.pageY-20+"px"

document.body.appendChild(hit)

setTimeout(()=>hit.remove(),400)

})

/* create horse */

function createHorse(){

const horse=document.createElement("div")
horse.className="horse"

horse.innerHTML=`
<div class="horse-head"></div>
<div class="horse-body"></div>
<div class="leg l1"></div>
<div class="leg l2"></div>
<div class="leg l3"></div>
<div class="leg l4"></div>
<div class="jockey">
<div class="jockey-head"></div>
<div class="jockey-body"></div>
</div>
`

horse.speed=0.015+Math.random()*0.02

horse.onclick=()=>{
score++
document.getElementById("score").textContent=score
horse.style.transform="scale(1.2)"
setTimeout(()=>horse.style.transform="scale(1)",100)
}

racecourse.appendChild(horse)
horses.push(horse)

}

/* move horses */

function moveHorses(){

if(!running) return

angle+=0.01

const centerX=550
const centerY=300

const radiusX=420
const radiusY=180

horses.forEach((horse,i)=>{

const offset=i*1.5

const x=centerX + radiusX*Math.cos(angle*horse.speed*60+offset) - 60
const y=centerY + radiusY*Math.sin(angle*horse.speed*60+offset) - 40

horse.style.left=x+"px"
horse.style.top=y+"px"

})

requestAnimationFrame(moveHorses)

}

/* start */

function startGame(){

score=0
time=30
running=true
angle=0
horses=[]

document.getElementById("score").textContent=0
document.getElementById("time").textContent=time

racecourse.innerHTML='<div class="crowd"></div><div class="track"></div>'

for(let i=0;i<4;i++){
createHorse()
}

moveHorses()

const timer=setInterval(()=>{

time--
document.getElementById("time").textContent=time

if(time<=0){
running=false
clearInterval(timer)
alert("Race finished! Your score: "+score)
}

},1000)

}

</script>

</body>
</html>
